<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rolling a Die Simulation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>Task 2 - Rolling a Die Simulation</h1>
        <p>Monte Carlo simulation for ordered outcomes of 1, 2, or 3 fair die rolls.</p>
      </header>

      <section class="panel controls">
        <label for="rollCount">Number of rolls</label>
        <select id="rollCount">
          <option value="1">1 roll</option>
          <option value="2">2 rolls</option>
          <option value="3" selected>3 rolls</option>
        </select>

        <label for="trialCount">Number of trials</label>
        <input id="trialCount" type="number" min="1" step="1" value="5000" />

        <button id="runBtn" type="button">Run simulation</button>
      </section>

      <section class="panel summary" id="summary"></section>

      <section class="panel" id="tablePanel">
        <h2 id="tableTitle">Results</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Elementary Outcome</th>
                <th>Count</th>
                <th>Observed Frequency</th>
                <th>Theoretical Frequency</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="topPanel" hidden>
        <h2>Top observed outcomes (3-roll mode)</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Outcome</th>
                <th>Count</th>
                <th>Observed Frequency</th>
              </tr>
            </thead>
            <tbody id="topBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
