<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 8 - Card Probability Simulation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Task 8 - Card Probability Simulation</h1>
      <p class="subtitle">Compare exact probabilities with Monte Carlo estimates.</p>

      <section class="panel controls">
        <label for="mode">Draw mode</label>
        <select id="mode">
          <option value="one">1 draw</option>
          <option value="with">2 draws with replacement</option>
          <option value="without" selected>2 draws without replacement</option>
        </select>

        <label for="trialCount">Number of trials</label>
        <input id="trialCount" type="number" min="1" step="1" value="10000" />

        <button id="runBtn" type="button">Run simulation</button>
      </section>

      <section class="panel" id="summary"></section>

      <section class="panel">
        <h2>Event probabilities</h2>
        <table>
          <thead>
            <tr>
              <th>Event</th>
              <th>Subset / rule</th>
              <th>Exact probability</th>
              <th>Observed frequency</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
