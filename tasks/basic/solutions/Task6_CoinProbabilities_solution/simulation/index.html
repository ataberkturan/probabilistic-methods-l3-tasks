<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 6 - Coin Probability Simulation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Task 6 - Coin Probability Simulation</h1>
      <p class="subtitle">See all possible outcomes first, then compare exact probabilities with Monte Carlo estimates.</p>

      <section class="panel controls">
        <label for="tossCount">Number of tosses</label>
        <select id="tossCount">
          <option value="1">1 toss</option>
          <option value="2">2 tosses</option>
          <option value="3" selected>3 tosses</option>
        </select>

        <label for="trialCount">Number of trials</label>
        <input id="trialCount" type="number" min="1" step="1" value="10000" />

        <button id="runBtn" type="button">Run simulation</button>
      </section>

      <section class="panel">
        <h2>All possible outcomes</h2>
        <p class="panel-note" id="spaceInfo"></p>
        <div class="chip-grid" id="sampleSpace"></div>
      </section>

      <details class="panel summary-panel">
        <summary>Open summary results</summary>
        <div id="summary"></div>
      </details>

      <section class="panel">
        <h2>Event probabilities</h2>
        <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Event</th>
              <th>Good outcomes</th>
              <th>How many good outcomes</th>
              <th>Exact probability</th>
              <th>Observed result</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
