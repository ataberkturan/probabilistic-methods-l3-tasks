<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Tossing Simulation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Task 1 - Coin Tossing Simulation</h1>
      <p class="subtitle">See the full sample space first, then compare observed frequencies with the theoretical ones.</p>

      <section class="panel controls">
        <label for="tossCount">Number of tosses</label>
        <select id="tossCount">
          <option value="1">1 toss</option>
          <option value="2">2 tosses</option>
          <option value="3" selected>3 tosses</option>
        </select>

        <label for="trialCount">Number of trials</label>
        <input id="trialCount" type="number" min="1" step="1" value="1000" />

        <button id="runBtn" type="button">Run simulation</button>
      </section>

      <section class="panel">
        <h2>All possible outcomes</h2>
        <p class="panel-note" id="spaceInfo"></p>
        <div class="chip-grid" id="sampleSpace"></div>
      </section>

      <details class="panel summary-panel">
        <summary>Open summary results</summary>
        <div id="summary"></div>
      </details>

      <section class="panel results">
        <h2>Observed and theoretical frequencies</h2>
        <table>
          <thead>
            <tr>
              <th>Elementary Outcome</th>
              <th>Count</th>
              <th>Observed Frequency</th>
              <th>Theoretical Frequency</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
