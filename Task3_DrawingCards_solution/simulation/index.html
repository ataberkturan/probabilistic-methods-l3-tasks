<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 3 - Drawing Cards Simulation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Task 3 - Drawing Cards Simulation</h1>
      <p class="subtitle">Ordered pairs from a standard 52-card deck</p>

      <section class="controls card">
        <label for="mode">Draw mode</label>
        <select id="mode">
          <option value="with">With replacement</option>
          <option value="without">Without replacement</option>
        </select>

        <label for="trials">Number of trials</label>
        <input id="trials" type="number" min="1" step="1" value="10000" />

        <button id="runBtn" type="button">Run simulation</button>
      </section>

      <section class="card summary" id="summary"></section>

      <section class="card">
        <h2>Top observed outcomes</h2>
        <table>
          <thead>
            <tr>
              <th>Outcome (ordered)</th>
              <th>Count</th>
              <th>Observed frequency</th>
              <th>Theoretical frequency</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
