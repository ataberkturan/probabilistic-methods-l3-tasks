<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 9 - Weather Probability Simulation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Task 9 - Weekly Weather Probability Simulation</h1>
      <p class="subtitle">7 independent days, each day: S, C, or R with probability 1/3.</p>

      <section class="panel controls">
        <label for="trialCount">Number of simulated weeks</label>
        <input id="trialCount" type="number" min="1" step="1" value="10000" />

        <button id="runBtn" type="button">Run simulation</button>
      </section>

      <section class="panel" id="summary"></section>

      <section class="panel">
        <h2>Event probabilities</h2>
        <table>
          <thead>
            <tr>
              <th>Event</th>
              <th>Rule</th>
              <th>Exact probability</th>
              <th>Observed frequency</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
